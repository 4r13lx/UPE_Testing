name: C CI Pipeline

on:
  push:
    branches: [ "2026/Clase_6" ]
  pull_request:
    branches: [ "2026/Clase_6" ]

jobs:
  build-test:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest

    # Define a matrix to run the job for each project
    strategy:
      matrix:
        project: [ano_bisiesto]

    # Set the working directory for all steps in this job
    defaults:
      run:
        working-directory: ${{ matrix.project }}

    # Define the steps to build, test, and analyze the project
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Cache build artifacts to speed up subsequent runs
    - name: Cache Sonar wrapper
      id: cache-wrapper
      uses: actions/cache@v4
      with:
        path: build-wrapper-linux-x86
        key: sonar-wrapper-v1

    # Set up C/C++ environment
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov unzip curl
        
    # Download and set up SonarQube Scanner
    - name: Download Sonar build-wrapper
      if: steps.cache-wrapper.outputs.cache-hit != 'true'
      run: |
        curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
        unzip build-wrapper.zip

    # Build the project with build-wrapper to capture compilation data
    - name: Build with wrapper
      run: |
        rm -rf bw-output
        mkdir bw-output
        ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
          --out-dir bw-output \
        make clean build
# /usr/bin/gcc -c $(find src tests -name "*.c") -Isrc -Itests

    - name: Run tests
      run: |
        make test
        ls -la
        cat bw-output/compile_commands.json
        cat bw-output/build-wrapper-dump.json

    # Generate coverage data
    - name: Generate coverage report
      run: make coverage-report

    # Sonar scan
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v8.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        projectBaseDir: ${{ matrix.project }}
        args: >
          -Dsonar.projectKey=${{ matrix.project }}
          -Dsonar.organization=unarix
          -Dsonar.sources=.
          -Dsonar.tests=tests
          -Dsonar.cfamily.build-wrapper-output=${{ matrix.project }}/bw-output
          -Dsonar.cfamily.gcov.reportsPath=.
          -Dsonar.exclusions=**/README.md,**/build-wrapper-dump.json,tests/**

    - name: Debug Sonar Report
      run: |
        ls -la
        cat .scannerwork/report-task.txt

    # Quality Gate
    - name: SonarQube Quality Gate
      uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
      timeout-minutes: 5
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        scanMetadataReportFile: .scannerwork/report-task.txt
