name: C CI Pipeline

on:
  push:
    branches: [ "2026/Clase_6" ]
  pull_request:
    branches: [ "2026/Clase_6" ]

jobs:
  build-test:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest

    # Define a matrix to run the job for each project
    strategy:
      matrix:
        project: [ano_bisiesto]

    # Set the working directory for all steps in this job
    defaults:
      run:
        working-directory: ${{ matrix.project }}

    # Define the steps to build, test, and analyze the project
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up C/C++ environment
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential lcov unzip curl

    # Download and set up SonarQube Scanner
    - name: Download Sonar build-wrapper
      run: |
        curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
        unzip build-wrapper.zip
        ls -la
        ls -la build-wrapper-linux-x86

    # Build the project with build-wrapper to capture compilation data
    - name: Build and Test with wrapper
      run: |
        ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
        --out-dir bw-output \
        ls -la
        make clean test

    # Generate coverage data
    - name: Generate coverage report
      run: make -C ${{ matrix.project }} coverage-report

    # Sonar scan
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v8.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.projectKey=${{ matrix.project }}
          -Dsonar.organization=unarix
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.cfamily.build-wrapper-output=bw-output
          -Dsonar.cfamily.gcov.reportsPath=.
          -Dsonar.exclusions=**/README.md,**/build-wrapper-dump.json

    # Quality Gate
    - name: SonarQube Quality Gate
      uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
