name: C CI Pipeline

on:
  push:
    branches: [ "2026/Clase_6" ]
  pull_request:
    branches: [ "2026/Clase_6" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [ano_bisiesto]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential lcov

    - name: Build and run tests
      run: make -C ${{ matrix.project }} tests

    - name: Generate coverage report
      run: make -C ${{ matrix.project }} coverage-report

